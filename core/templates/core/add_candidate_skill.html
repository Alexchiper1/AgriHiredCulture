<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Candidate Skill</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 520px;">
        <h1 class="h4 mb-3 text-success">Add Skill</h1>

        <form method="post" class="bg-white p-3 border rounded">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success btn-sm">Save Skill</button>
            <a href="/skills/" class="btn btn-outline-secondary btn-sm ms-2">Back</a>
        </form>

        <p class="mt-3 mb-0">
            <a href="/" class="text-success">Home</a>
        </p>
    </div>
</body>
</html>
