<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4">
    <h1>Apply for Job</h1>

    <p><strong>Job:</strong> {{ job.title }}</p>
    <p><strong>Location:</strong> {{ job.location }}</p>
    <p><strong>Description:</strong> {{ job.description }}</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-success btn-sm">Submit Application</button>
    </form>

    <p class="mt-3"><a href="/jobs/" class="btn btn-outline-secondary btn-sm">Back to Jobs</a></p>
    <p><a href="/" class="btn btn-outline-secondary btn-sm">Home</a></p>
    </div>
</body>
</html>
