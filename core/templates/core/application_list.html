<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applications</title>
</head>
<body>
    <h1>Applications</h1>

    {% if applications %}
        <ul>
            {% for application in applications %}
                <li>
                    {{ application.candidate.full_name }} applied for
                    {{ application.job.title }} -
                    Status: {{ application.status }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No applications found.</p>
    {% endif %}

    <p><a href="/applications/add/">Add Application</a></p>
    <p><a href="/">Home</a></p>
</body>
</html>
