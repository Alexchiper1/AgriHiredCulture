<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Skills</title>
</head>
<body>
    <h1>Candidate Skills</h1>

    {% if skills %}
        <ul>
            {% for item in skills %}
                <li>{{ item.candidate.full_name }} - {{ item.skill.name }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No candidate skills found.</p>
    {% endif %}

    <p><a href="/skills/add/">Add Candidate Skill</a></p>
    <p><a href="/">Home</a></p>
</body>
</html>
