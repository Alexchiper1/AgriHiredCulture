<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4" style="max-width: 600px;">
    <h1>Add Job</h1>

    <form method="post" class="bg-white border rounded p-3">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success btn-sm">Save Job</button>
    </form>

    <p class="mt-3"><a href="/jobs/" class="btn btn-outline-secondary btn-sm">View Jobs</a></p>
    <p><a href="/" class="btn btn-outline-secondary btn-sm">Home</a></p>
    </div>
</body>
</html>
