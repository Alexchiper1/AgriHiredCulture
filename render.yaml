services:
  - type: web
    name: agrihiredculture
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput && python manage.py seed_data
    startCommand: gunicorn agrihiredculture.wsgi:application
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: agrihiredculture.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://agrihiredculture.onrender.com
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: agrihiredculture-db
          property: connectionString

databases:
  - name: agrihiredculture-db
    plan: free
